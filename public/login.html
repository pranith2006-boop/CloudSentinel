<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identity - CloudSentinel</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5rem;
    }
    .auth-tab {
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 500;
      transition: all 0.3s ease;
      border-radius: 6px;
      border-bottom: 2px solid transparent;
    }
    .auth-tab.active {
      color: var(--primary-blue);
      background: rgba(14, 165, 233, 0.1);
      border-bottom-color: var(--primary-blue);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="toast-container" id="toastContainer"></div>

  <div class="login-container">
    <div class="login-card reveal visible">
      <div class="login-header">
        <i class="fa-solid fa-shield-halved icon-blue" style="font-size: 2.5rem; margin-bottom: 1rem;"></i>
        <h2>Welcome to CloudSentinel</h2>
        <p>Enterprise Identity Gateway</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin">Login</div>
        <div class="auth-tab" id="tabRegister">Register</div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label><i class="fa-solid fa-user"></i> Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">Verify Identity</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label><i class="fa-solid fa-user-plus"></i> Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-envelope"></i> Email Address</label>
          <input type="email" id="regEmail" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-key"></i> Password</label>
          <input type="password" id="regPassword" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-primary btn-full" id="registerBtn">Create Account</button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        <i class="fa-solid fa-info-circle"></i> Authorized Access Only
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/particles.js"></script>
</body>
</html>
