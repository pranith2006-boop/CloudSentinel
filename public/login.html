<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to CloudSentinel - Enterprise cloud testing platform.">
  <title>Login - CloudSentinel</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="toast-container" id="toastContainer"></div>

  <nav class="navbar">
    <a href="/" class="logo-section">
      <i class="fa-solid fa-cloud logo-icon"></i>
      <span>CloudSentinel</span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
    </div>
  </nav>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="fa-solid fa-user-shield icon"></i>
        <h2>Welcome Back</h2>
        <p>Sign in to manage cloud tests</p>
      </div>

      <div class="login-tabs">
        <div class="login-tab active">Login</div>
        <div class="login-tab">Register</div>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" value="admin" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" value="password" required>
        </div>
        <button type="submit" class="btn-primary btn-full">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Authenticate
        </button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/particles.js"></script>
</body>
</html>
